<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A little question for you love ...</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Nunito:wght@400;600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --rose:#FF4D6D;
    --rose-soft:#FF8FA3;
    --rose-deep:#6B2B3A;
    --blush:#FFE9E4;
    --peach:#FFD3C4;
    --cream:#FFF8F4;
    --shadow:0 18px 45px -18px rgba(157,52,77,.55);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Nunito',system-ui,sans-serif;
    color:var(--rose-deep);
    background:linear-gradient(160deg,#FFEDE7 0%,#FFD9CC 45%,#FFC2CE 100%);
    min-height:100dvh;
    overflow-x:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    position:relative;
  }

  /* floating ambient hearts */
  .ambient{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
  .ambient span{
    position:absolute;bottom:-40px;font-size:22px;opacity:.0;
    animation:rise linear infinite;
  }
  @keyframes rise{
    0%{transform:translateY(0) rotate(0);opacity:0;}
    10%{opacity:.5;}
    90%{opacity:.5;}
    100%{transform:translateY(-115dvh) rotate(40deg);opacity:0;}
  }

  .stage{position:relative;z-index:2;width:100%;max-width:520px;}

  .card{
    background:var(--cream);
    border-radius:28px;
    padding:44px 32px 38px;
    box-shadow:var(--shadow);
    text-align:center;
    display:none;
    animation:pop .5s cubic-bezier(.2,.9,.3,1.3) both;
  }
  .card.active{display:block;}
  @keyframes pop{from{opacity:0;transform:translateY(18px) scale(.96);}to{opacity:1;transform:none;}}

  .heart-big{
    font-size:64px;display:inline-block;line-height:1;
    animation:beat 1.3s ease-in-out infinite;
    filter:drop-shadow(0 8px 14px rgba(255,77,109,.4));
  }
  @keyframes beat{0%,100%{transform:scale(1);}15%{transform:scale(1.18);}30%{transform:scale(1);}45%{transform:scale(1.12);}}

  h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:clamp(28px,7vw,40px);
    line-height:1.12;
    margin:18px 0 6px;
    color:var(--rose-deep);
  }
  .sub{font-size:16px;color:#A65A66;margin-bottom:28px;font-weight:600;}
  .step-title{font-family:'Fraunces',serif;font-size:clamp(24px,6vw,32px);font-weight:600;margin-bottom:8px;}

  .btn-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
  button{
    font-family:'Nunito',sans-serif;
    font-weight:800;
    font-size:18px;
    border:none;
    border-radius:50px;
    padding:15px 34px;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .2s ease;
  }
  .btn-yes{
    background:var(--rose);
    color:#fff;
    box-shadow:0 10px 22px -8px rgba(255,77,109,.8);
  }
  .btn-yes:hover{transform:translateY(-2px) scale(1.04);}
  .btn-yes:active{transform:scale(.97);}
  .btn-no{
    background:#fff;
    color:#B07682;
    border:2px solid #FFD6DC;
  }

  .tease{
    font-family:'Caveat',cursive;
    font-size:24px;color:var(--rose);
    min-height:30px;margin-top:22px;font-weight:700;
  }

  /* form bits */
  label.field{display:block;text-align:left;font-weight:700;margin:18px 0 6px;font-size:15px;}
  input[type=date],input[type=time]{
    width:100%;font-family:'Nunito',sans-serif;font-size:17px;font-weight:600;
    color:var(--rose-deep);
    padding:14px 16px;border:2px solid #FFD6DC;border-radius:16px;background:#fff;outline:none;
  }
  input:focus{border-color:var(--rose);}

  .food-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:6px;}
  .food{
    background:#fff;border:2px solid #FFE0E5;border-radius:18px;
    padding:16px 10px;font-weight:800;font-size:16px;color:var(--rose-deep);
    display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;
    transition:transform .12s ease,border-color .15s ease,background .15s ease;
  }
  .food .emo{font-size:30px;}
  .food:hover{transform:translateY(-3px);border-color:var(--rose-soft);}
  .food.sel{background:var(--rose);color:#fff;border-color:var(--rose);}
  .food.full{grid-column:1 / -1;}

  .actions{margin-top:26px;}
  .ghost{background:transparent;color:#B07682;font-size:15px;padding:8px;box-shadow:none;}

  .summary{
    background:#fff;border-radius:18px;padding:18px 20px;margin:20px 0;text-align:left;
    border:2px dashed #FFCAD2;
  }
  .summary .line{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;padding:7px 0;}
  .summary .line .ic{font-size:22px;}

  .send-row{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
  .send-btn{
    display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;
    border-radius:50px;padding:14px;font-weight:800;font-size:16px;
  }
  .wa{background:#25D366;color:#fff;}
  .sms{background:#fff;color:var(--rose);border:2px solid #FFD6DC;}
  .copy{background:#fff;color:var(--rose);border:2px solid #FFD6DC;cursor:pointer;}
  .hint{font-size:13px;color:#B07682;margin-top:14px;font-weight:600;}

  @media(max-width:380px){.card{padding:36px 22px 30px;}}
</style>
</head>
<body>
<div class="ambient" id="ambient"></div>

<div class="stage">

  <!-- STEP 1 : the question -->
  <section class="card active" id="step-ask">
    <span class="heart-big">💖</span>
    <h1>Hi Sakura, will you go on a date with me?</h1>
    <p class="sub">Your IT boy 🥺</p>
    <div class="btn-row" id="ask-row">
      <button class="btn-no" id="btnNo">No..</button>
      <button class="btn-yes" id="btnYes">Yes 💗</button>
    </div>
    <p class="tease" id="tease"></p>
  </section>

  <!-- STEP 2 : date & time -->
  <section class="card" id="step-when">
    <span class="heart-big">🎉</span>
    <h2 class="step-title">Yaaay! 💞</h2>
    <p class="sub">Now pick the day &amp; time</p>
    <label class="field" for="dateIn">📅 Which day?</label>
    <input type="date" id="dateIn">
    <label class="field" for="timeIn">⏰ What time?</label>
    <input type="time" id="timeIn">
    <div class="actions">
      <button class="btn-yes" id="toFood">Continue →</button>
    </div>
  </section>

  <!-- STEP 3 : food -->
  <section class="card" id="step-food">
    <span class="heart-big">😋</span>
    <h2 class="step-title">What are we eating?</h2>
    <p class="sub">Pick your craving</p>
    <div class="food-grid" id="foodGrid">
      <div class="food" data-food="Pizza"><span class="emo">🍕</span>Pizza</div>
      <div class="food" data-food="Sushi"><span class="emo">🍣</span>Sushi</div>
      <div class="food" data-food="Burger"><span class="emo">🍔</span>Burger</div>
      <div class="food" data-food="Pasta"><span class="emo">🍝</span>Pasta</div>
      <div class="food" data-food="Tacos"><span class="emo">🌮</span>Tacos</div>
      <div class="food" data-food="Ramen"><span class="emo">🍜</span>Ramen</div>
      <div class="food full" data-food="African food"><span class="emo">🍲</span>African food</div>
    </div>
    <div class="actions">
      <button class="btn-yes" id="toDone">Make your prince happy 💌</button>
    </div>
  </section>

  <!-- STEP 4 : recap + send -->
  <section class="card" id="step-done">
    <span class="heart-big">💌</span>
    <h2 class="step-title">It's a date! 🥰</h2>
    <p class="sub">Send it to me so I know 👇</p>
    <div class="summary" id="summary"></div>
    <div class="send-row">
      <a class="send-btn wa" id="waBtn" href="#" target="_blank" rel="noopener">Send on WhatsApp 💬</a>
      <a class="send-btn sms" id="smsBtn" href="#">Send by SMS ✉️</a>
      <button class="send-btn copy" id="copyBtn">Copy the message 📋</button>
    </div>
    <p class="hint" id="hint"></p>
  </section>

</div>

<script>
/* =======================================================

   ======================================================= */
const MY_NAME       = "Sz";   
const MY_WHATSAPP   = "0022791710709";              
/* ======================================================= */

const $ = s => document.querySelector(s);

/* ---------- ambient floating hearts ---------- */
(function(){
  const wrap = $('#ambient');
  const emojis = ['💗','💕','💖','🌸','💘','🩷'];
  for(let i=0;i<14;i++){
    const s=document.createElement('span');
    s.textContent=emojis[i%emojis.length];
    s.style.left=Math.random()*100+'vw';
    s.style.fontSize=(16+Math.random()*22)+'px';
    s.style.animationDuration=(9+Math.random()*9)+'s';
    s.style.animationDelay=(Math.random()*9)+'s';
    wrap.appendChild(s);
  }
})();

/* ---------- step navigation ---------- */
function show(id){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
  const el=$(id);
  el.classList.add('active');
  el.style.animation='none'; void el.offsetWidth; el.style.animation='';
}

/* ---------- the runaway "No" button ---------- */
const btnNo = $('#btnNo');
const btnYes = $('#btnYes');
const tease = $('#tease');
const messages = [
  "Hihi, try again 😜",
  "Nope, that one's broken 🙈",
  "You can't catch it 😏",
  "The only real answer is Yes 💖",
  "Stop running away from love 😆",
  "Seriously... just say yes 🥺",
  "It's getting tired, just like you 😂",
  "Yes is right there ➡️💗"
];
let dodges = 0;

function dodge(){
  dodges++;
  // first dodge: detach the button so it can fly anywhere
  if(getComputedStyle(btnNo).position !== 'fixed'){
    btnNo.style.position='fixed';
    btnNo.style.zIndex='50';
  }
  const bw = btnNo.offsetWidth, bh = btnNo.offsetHeight;
  const maxX = Math.max(8, window.innerWidth  - bw - 12);
  const maxY = Math.max(8, window.innerHeight - bh - 12);
  btnNo.style.left = (Math.random()*maxX)+'px';
  btnNo.style.top  = (Math.random()*maxY)+'px';

  // shrink No, grow Yes — make the choice obvious 😄
  const noScale = Math.max(0.55, 1 - dodges*0.06);
  btnNo.style.transform = `scale(${noScale})`;
  const yesScale = Math.min(1.6, 1 + dodges*0.07);
  btnYes.style.transform = `scale(${yesScale})`;

  tease.textContent = messages[Math.min(dodges-1, messages.length-1)];
}
['mouseenter','pointerdown','touchstart','focus','click'].forEach(ev=>{
  btnNo.addEventListener(ev, e=>{ e.preventDefault(); dodge(); }, {passive:false});
});

btnYes.addEventListener('click', ()=>{
  // sensible default: tomorrow evening
  const t=new Date(); t.setDate(t.getDate()+1);
  $('#dateIn').value = t.toISOString().slice(0,10);
  $('#dateIn').min = new Date().toISOString().slice(0,10);
  $('#timeIn').value = "19:30";
  show('#step-when');
});

/* ---------- date & time ---------- */
$('#toFood').addEventListener('click', ()=>{
  if(!$('#dateIn').value || !$('#timeIn').value){
    alert("Pick a day and a time first 💗");
    return;
  }
  show('#step-food');
});

/* ---------- food selection ---------- */
let chosenFood = null;
$('#foodGrid').addEventListener('click', e=>{
  const f = e.target.closest('.food');
  if(!f) return;
  document.querySelectorAll('.food').forEach(x=>x.classList.remove('sel'));
  f.classList.add('sel');
  chosenFood = f.dataset.food;
});

/* ---------- build recap + send links ---------- */
function prettyDate(iso){
  const d=new Date(iso+'T00:00');
  return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
}
let finalMessage = "";

$('#toDone').addEventListener('click', ()=>{
  if(!chosenFood){ alert("Pick what we're eating 😋"); return; }

  const dateStr = prettyDate($('#dateIn').value);
  const timeStr = $('#timeIn').value;
  const foodEmoji = { "Pizza":"🍕","Sushi":"🍣","Burger":"🍔","Pasta":"🍝","Tacos":"🌮","Ramen":"🍜","African food":"🍲" }[chosenFood] || "🍽️";

  $('#summary').innerHTML =
    `<div class="line"><span class="ic">💗</span> Yes — it's a date!</div>
     <div class="line"><span class="ic">📅</span> ${dateStr}</div>
     <div class="line"><span class="ic">⏰</span> ${timeStr}</div>
     <div class="line"><span class="ic">${foodEmoji}</span> ${chosenFood}</div>`;

  finalMessage =
    `Yes, I'll go on a date with you ${MY_NAME}! 💖\n`+
    `📅 ${dateStr}\n⏰ ${timeStr}\n${foodEmoji} ${chosenFood}\n— see you then 🥰`;

  const enc = encodeURIComponent(finalMessage);

  // WhatsApp
  const wa = $('#waBtn');
  wa.href = MY_WHATSAPP ? `https://wa.me/${MY_WHATSAPP}?text=${enc}` : `https://wa.me/?text=${enc}`;

  // SMS
  $('#smsBtn').href = MY_WHATSAPP ? `sms:${MY_WHATSAPP}?body=${enc}` : `sms:?body=${enc}`;

  $('#hint').textContent = MY_WHATSAPP ? "" : "Tip: tap WhatsApp, then choose the chat to send it 💌";

  show('#step-done');
});

/* ---------- copy ---------- */
$('#copyBtn').addEventListener('click', async ()=>{
  try{
    await navigator.clipboard.writeText(finalMessage);
    $('#copyBtn').textContent = "Copied! ✅";
    setTimeout(()=>{ $('#copyBtn').textContent="Copy the message 📋"; },1800);
  }catch(_){
    alert(finalMessage);
  }
});

/* reposition runaway button if window resizes while it's loose */
window.addEventListener('resize', ()=>{
  if(getComputedStyle(btnNo).position==='fixed') dodge();
});
</script>
</body>
</html>
